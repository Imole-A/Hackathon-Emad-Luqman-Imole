<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ten10 Admin - Manage Roles</title>
    <style>
        /* === COLOR THEME & GLOBAL STYLES === */
        :root {
            --primary-blue: #0056b3; 
            --secondary-blue: #007BFF;
            --light-blue: #E6F2FF;   
            --white: #FFFFFF;
            --text-dark: #333333;
            --border-color: #CCE0FF;
            --success: #28A745;
            --danger: #DC3545;
            --bg-gray: #F4F7FA;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray); 
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* === HEADER & NAVIGATION === */
        header {
            background-color: #1a2a3a; /* Darker header for Admin distinction */
            color: var(--white);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 1.6rem; display: flex; align-items: center; gap: 10px;}
        header h1 span { background: var(--danger); padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; }

        .nav-buttons button {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 15px;
            margin-left: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-buttons button:hover, .nav-buttons button.active {
            background: var(--white);
            color: var(--secondary-blue);
        }

        /* === PAGE LAYOUT === */
        .admin-container {
            max-width: 1200px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            padding: 0 20px;
        }

        /* === LEFT PANEL: ROLE LIST === */
        .sidebar {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            height: fit-content;
        }

        .sidebar h3 {
            color: var(--primary-blue);
            margin-top: 0;
            border-bottom: 2px solid var(--light-blue);
            padding-bottom: 10px;
        }

        .role-list-item {
            padding: 12px 15px;
            border: 1px solid transparent;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .role-list-item:hover {
            background-color: var(--light-blue);
            color: var(--primary-blue);
        }

        .role-list-item.active {
            background-color: var(--primary-blue);
            color: var(--white);
            border-color: var(--primary-blue);
        }

        .btn-add-new {
            width: 100%;
            background-color: var(--white);
            color: var(--success);
            border: 2px dashed var(--success);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.2s;
        }
        .btn-add-new:hover { background-color: #e8f5e9; }

        /* === RIGHT PANEL: EDITOR FORM === */
        .editor-panel {
            background: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.1);
        }

        .editor-panel h2 {
            color: var(--primary-blue);
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--light-blue);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        
        .form-control:focus {
            border-color: var(--secondary-blue);
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.3);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* Skills Benchmark Table */
        .benchmark-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .benchmark-table th, .benchmark-table td {
            padding: 10px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .benchmark-table th {
            background-color: var(--light-blue);
            color: var(--primary-blue);
        }

        .benchmark-table select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: 100%;
        }

        /* Buttons */
        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn-save {
            background-color: var(--secondary-blue);
            color: var(--white);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-save:hover { background-color: var(--primary-blue); transform: translateY(-2px); }

        .btn-delete {
            background-color: var(--white);
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-delete:hover { background-color: var(--danger); color: var(--white); }

        /* Notification Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: var(--success);
            color: white;
            text-align: center;
            border-radius: 4px;
            padding: 15px;
            position: fixed;
            z-index: 1000;
            right: 30px;
            bottom: 30px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

    </style>
</head>
<body>

    <header>
        <h1>Ten10 Admin Portal <span>ADMINISTRATOR</span></h1>
        <div class="nav-buttons">
            <button onclick="alert('Navigating to Admin Dashboard...')">Dashboard</button>
            <button onclick="alert('Navigating to Manage Users...')">Manage Users</button>
            <button class="active">Role Benchmarks</button>
            <button onclick="window.location.href='user-portal.html'" style="border-color: var(--danger); color: #ffcccc;">Exit Admin</button>
        </div>
    </header>

    <div class="admin-container">
        
        <div class="sidebar">
            <h3>Active Roles</h3>
            <div id="roleListContainer">
                </div>
            <button class="btn-add-new" onclick="createNewRole()">+ Add New Tech Role</button>
        </div>

        <div class="editor-panel">
            <h2>
                <span id="editorTitle">Edit Role: Business Analyst</span>
            </h2>

            <form id="roleForm" onsubmit="event.preventDefault(); saveRole();">
                <div class="form-group">
                    <label for="roleName">Role Title</label>
                    <input type="text" id="roleName" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="roleSalary">Salary Band (e.g., £32,000 – £95,000+)</label>
                    <input type="text" id="roleSalary" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="roleOverview">Job Overview</label>
                    <textarea id="roleOverview" class="form-control" required></textarea>
                </div>

                <div class="form-group">
                    <label>Required Skill Benchmarks (Matrix Targets)</label>
                    <table class="benchmark-table" id="skillsTable">
                        <thead>
                            <tr>
                                <th>Skill Name</th>
                                <th>Category</th>
                                <th style="width: 150px;">Required Level (1-5)</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="skillsTableBody">
                            </tbody>
                    </table>
                    <button type="button" class="btn-add-new" style="margin-top: 0; padding: 5px; width: auto; font-size: 0.9rem;" onclick="addSkillRow()">+ Add Skill Requirement</button>
                </div>

                <div class="form-group">
                    <label for="roleQuals">Mandatory Qualifications</label>
                    <textarea id="roleQuals" class="form-control" required></textarea>
                </div>

                <div class="action-bar">
                    <button type="button" class="btn-delete" onclick="deleteRole()">Delete Role</button>
                    <button type="submit" class="btn-save">Save Changes to Matrix</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast">Role successfully saved to database!</div>

    <script>
        // Mock Database of Roles (Starting with a few from the Word Doc)
        let adminRolesDB = [
            {
                id: 1,
                title: "Business Analyst",
                salary: "£32,000 – £95,000+",
                overview: "Identify business needs and determine solutions to business problems in Digital Transformation projects.",
                qualifications: "Mandatory: Degree in Business/IT or 3+ years experience. Desirable: BCS International Diploma.",
                skills: [
                    { name: "Requirements Engineering", category: "Hard Skill", level: 4 },
                    { name: "Data Visualization (Power BI)", category: "Hard Skill", level: 4 },
                    { name: "Stakeholder Management", category: "Soft Skill", level: 3 }
                ]
            },
            {
                id: 2,
                title: "Data Engineer",
                salary: "£35,000 – £90,000",
                overview: "Build the infrastructure that supports the UK’s growing AI and Analytics sectors.",
                qualifications: "Mandatory: Degree in quantitative subject. Required: Major cloud provider experience.",
                skills: [
                    { name: "Advanced SQL", category: "Hard Skill", level: 5 },
                    { name: "Python (Pandas, PySpark)", category: "Hard Skill", level: 4 },
                    { name: "Architectural Thinking", category: "Soft Skill", level: 3 }
                ]
            },
            {
                id: 3,
                title: "DevOps Engineer",
                salary: "£45,000 – £150,000+",
                overview: "Bridge the gap between code and infrastructure. Focus on high-velocity delivery and system reliability.",
                qualifications: "Required: CKA (Certified Kubernetes Admin), AWS DevOps Pro.",
                skills: [
                    { name: "Infrastructure as Code (Terraform)", category: "Hard Skill", level: 4 },
                    { name: "CI/CD Pipeline Design", category: "Hard Skill", level: 4 },
                    { name: "Incident Response", category: "Soft Skill", level: 5 }
                ]
            }
        ];

        let currentEditingId = null;

        // 1. Render the Sidebar List
        function renderSidebar() {
            const container = document.getElementById('roleListContainer');
            container.innerHTML = '';
            
            adminRolesDB.forEach(role => {
                const div = document.createElement('div');
                div.className = `role-list-item ${role.id === currentEditingId ? 'active' : ''}`;
                div.innerText = role.title;
                div.onclick = () => loadRoleIntoEditor(role.id);
                container.appendChild(div);
            });
        }

        // 2. Load Role Data into the Editor Form
        function loadRoleIntoEditor(id) {
            currentEditingId = id;
            renderSidebar(); // Update active class
            
            const role = adminRolesDB.find(r => r.id === id);
            
            document.getElementById('editorTitle').innerText = `Edit Role: ${role.title}`;
            document.getElementById('roleName').value = role.title;
            document.getElementById('roleSalary').value = role.salary;
            document.getElementById('roleOverview').value = role.overview;
            document.getElementById('roleQuals').value = role.qualifications;

            // Render Skills Table
            const tbody = document.getElementById('skillsTableBody');
            tbody.innerHTML = '';
            role.skills.forEach(skill => {
                tbody.appendChild(createSkillRow(skill.name, skill.category, skill.level));
            });
        }

        // 3. Create a Row for the Skills Table
        function createSkillRow(name = '', category = 'Hard Skill', level = 3) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="form-control" value="${name}" placeholder="e.g., Python" required></td>
                <td>
                    <select class="form-control">
                        <option value="Hard Skill" ${category === 'Hard Skill' ? 'selected' : ''}>Hard Skill</option>
                        <option value="Soft Skill" ${category === 'Soft Skill' ? 'selected' : ''}>Soft Skill</option>
                        <option value="Tool/Platform" ${category === 'Tool/Platform' ? 'selected' : ''}>Tool/Platform</option>
                    </select>
                </td>
                <td>
                    <select class="form-control">
                        <option value="1" ${level == 1 ? 'selected' : ''}>Level 1</option>
                        <option value="2" ${level == 2 ? 'selected' : ''}>Level 2</option>
                        <option value="3" ${level == 3 ? 'selected' : ''}>Level 3</option>
                        <option value="4" ${level == 4 ? 'selected' : ''}>Level 4</option>
                        <option value="5" ${level == 5 ? 'selected' : ''}>Level 5</option>
                    </select>
                </td>
                <td style="text-align:center;">
                    <button type="button" style="color:red; background:none; border:none; cursor:pointer; font-weight:bold;" onclick="this.closest('tr').remove()">X</button>
                </td>
            `;
            return tr;
        }

        // 4. Add an empty skill row
        function addSkillRow() {
            document.getElementById('skillsTableBody').appendChild(createSkillRow());
        }

        // 5. Create a completely new role template
        function createNewRole() {
            currentEditingId = null; // Denotes a new entry
            renderSidebar(); // Clear active highlights
            
            document.getElementById('editorTitle').innerText = `Create New Role`;
            document.getElementById('roleName').value = '';
            document.getElementById('roleSalary').value = '';
            document.getElementById('roleOverview').value = '';
            document.getElementById('roleQuals').value = '';
            
            const tbody = document.getElementById('skillsTableBody');
            tbody.innerHTML = '';
            // Add one blank row to start
            addSkillRow();
        }

        // 6. Save Form Data to Database
        function saveRole() {
            // Gather skills from the table
            const skills = [];
            const rows = document.getElementById('skillsTableBody').querySelectorAll('tr');
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input, select');
                if(inputs[0].value.trim() !== '') {
                    skills.push({
                        name: inputs[0].value,
                        category: inputs[1].value,
                        level: parseInt(inputs[2].value)
                    });
                }
            });

            const newRoleData = {
                title: document.getElementById('roleName').value,
                salary: document.getElementById('roleSalary').value,
                overview: document.getElementById('roleOverview').value,
                qualifications: document.getElementById('roleQuals').value,
                skills: skills
            };

            if (currentEditingId === null) {
                // ADD NEW
                newRoleData.id = Date.now(); // fake unique ID
                adminRolesDB.push(newRoleData);
                currentEditingId = newRoleData.id;
            } else {
                // UPDATE EXISTING
                const index = adminRolesDB.findIndex(r => r.id === currentEditingId);
                newRoleData.id = currentEditingId;
                adminRolesDB[index] = newRoleData;
            }

            // Update UI
            document.getElementById('editorTitle').innerText = `Edit Role: ${newRoleData.title}`;
            renderSidebar();
            
            // Show Success Toast
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // 7. Delete Role
        function deleteRole() {
            if(currentEditingId === null) {
                alert("Cannot delete an unsaved role.");
                return;
            }

            if(confirm("Are you sure you want to delete this role from the Ten10 Matrix? This will affect consultants currently mapped to this benchmark.")) {
                adminRolesDB = adminRolesDB.filter(r => r.id !== currentEditingId);
                
                // Load the first available role, or clear if empty
                if(adminRolesDB.length > 0) {
                    loadRoleIntoEditor(adminRolesDB[0].id);
                } else {
                    createNewRole();
                }
            }
        }

        // Initialize App
        loadRoleIntoEditor(adminRolesDB[0].id); // Load Business Analyst by default

    </script>
</body>
</html>
