<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Matrix - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96">
        <h2 id="form-title" class="text-2xl font-bold mb-6 text-center text-blue-400">Login</h2>
        
        <div class="space-y-4">
            <input type="text" id="full_name" placeholder="Full Name (For Register Only)" class="w-full p-2 rounded bg-gray-700 hidden">
            <input type="email" id="email" placeholder="Email" class="w-full p-2 rounded bg-gray-700">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 rounded bg-gray-700">
            
            <select id="account_type" class="w-full p-2 rounded bg-gray-700 hidden">
                <option value="2">Consultant</option>
                <option value="1">Admin</option>
            </select>

            <button onclick="handleSubmit()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold transition">Login</button>
            
            <p class="text-sm text-center">
                <span id="toggle-text">Don't have an account?</span> 
                <button onclick="toggleForm()" class="text-blue-400 underline">Click here</button>
            </p>
        </div>
    </div>

    <script>
        let isLogin = true;

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('submit-btn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('full_name').classList.toggle('hidden');
            document.getElementById('account_type').classList.toggle('hidden');
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/api/login' : '/api/register';
            
            const body = { email, password };
            if (!isLogin) {
                body.full_name = document.getElementById('full_name').value;
                body.account_type_id = document.getElementById('account_type').value;
            }

            const response = await fetch(`http://localhost:3000${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();
            if (response.ok) {
                alert(data.message);
                // Redirect to Browse Roles on success
                window.location.href = 'browseroles.html';
            } else {
                alert(data.error || "Something went wrong");
            }
        }
    </script>
</body>
</html>
